name: test-and-release
on:
  push:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -X utf8 -m pip install -e .
      - run: python -X utf8 -m unittest discover -s tests -v
      - run: python -X utf8 -m pip install -r requirements-build.txt
      - shell: powershell
        run: ./scripts/build.ps1
      - shell: powershell
        run: ./scripts/test-adapters.ps1
      - shell: powershell
        run: |
          $Version = python -X utf8 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          $ReleaseRoot = 'release/mo2-agent-toolkit'
          New-Item -ItemType Directory -Force "$ReleaseRoot/skill-bundle" | Out-Null
          Copy-Item dist/mo2-mod-installer-bundle "$ReleaseRoot/skill-bundle/mo2-mod-installer" -Recurse
          Copy-Item .codex-plugin,skills,scripts,config,assets -Destination $ReleaseRoot -Recurse
          Copy-Item AGENTS.md,README.md,LICENSE,CHANGELOG.md,THIRD_PARTY_NOTICES.md -Destination $ReleaseRoot
          $Zip = "release/mo2-agent-toolkit-v$Version-win-x64.zip"
          Compress-Archive $ReleaseRoot $Zip
          (Get-FileHash $Zip -Algorithm SHA256).Hash + "  " + (Split-Path $Zip -Leaf) | Set-Content release/SHA256SUMS.txt -Encoding ascii
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/*
      - if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/SHA256SUMS.txt
